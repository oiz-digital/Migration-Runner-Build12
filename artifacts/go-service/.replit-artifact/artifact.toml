kind = "web"
previewPath = "/go-service/"
title = "CryptoX Go Service"
version = "1.0.0"
id = "artifacts/go-service"
router = "path"

[[services]]
name = "web"
paths = [ "/go-service/", "/go-service/healthz", "/go-service/ws" ]
localPort = 23004

[services.development]
run = "go run ."

[services.production]

[services.production.build]
args = ["sh", "-c", "cd artifacts/go-service && go build -o server ."]

[services.production.run]
args = ["./artifacts/go-service/server"]

[services.production.run.env]
PORT = "23004"
BASE_PATH = "/go-service/"

[services.production.health.startup]
path = "/go-service/"
