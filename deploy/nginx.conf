# ============================================================
# Zebvix — Nginx Reverse Proxy Config
# Place at: /etc/nginx/sites-available/cryptox
# Enable:   ln -s /etc/nginx/sites-available/cryptox /etc/nginx/sites-enabled/
# SSL:      certbot --nginx -d zebvix.com -d www.zebvix.com
# ============================================================

upstream cryptox_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream cryptox_go {
    server 127.0.0.1:23004;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name zebvix.com www.zebvix.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ── Main HTTPS server ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name zebvix.com www.zebvix.com;

    # SSL certs (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/zebvix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zebvix.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy        "payment=(), geolocation=(), camera=(), microphone=(), usb=(), interest-cohort=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # Client upload limit (for KYC docs)
    client_max_body_size 20M;

    # ── Root: redirect to user portal ──────────────────────────
    location = / {
        return 301 /user/;
    }

    # ── User Portal (React SPA — static files) ─────────────────
    location /user/ {
        alias /opt/cryptox/dist/user/;
        try_files $uri $uri/ /user/index.html;
        expires 1d;
        add_header Cache-Control "public, max-age=86400, immutable";
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # ── Admin Panel (React SPA — static files) ─────────────────
    location /admin/ {
        alias /opt/cryptox/dist/admin/;
        try_files $uri $uri/ /admin/index.html;
        # Restrict admin to office IPs (recommended — uncomment and edit):
        # allow 203.0.113.0/24;
        # deny all;
        expires 1h;
        add_header Cache-Control "no-cache";
    }

    # ── API Server (Node.js + Express) ─────────────────────────
    location /api/ {
        proxy_pass         http://cryptox_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── WebSocket (price feed, order book) ─────────────────────
    location /api/ws {
        proxy_pass         http://cryptox_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    # ── Block internal RPC routes ────────────────────────────────
    # Go engine exposes /internal/* for Node→Go loopback RPC only.
    # Explicitly deny at the proxy layer — defense in depth on top of
    # the INTERNAL_SECRET middleware and 127.0.0.1 bind in production.
    location /internal/ {
        return 403;
    }

    # ── Go Order Matching Engine ────────────────────────────────
    location /go-service/ {
        proxy_pass         http://cryptox_go;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Uploads / static assets ────────────────────────────────
    location /uploads/ {
        alias /opt/cryptox/uploads/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── Favicon + robots ────────────────────────────────────────
    location = /favicon.ico { alias /opt/cryptox/dist/user/favicon.ico; access_log off; }
    location = /robots.txt  { alias /opt/cryptox/dist/user/robots.txt; access_log off; }
}

# ── WebSocket upgrade map ────────────────────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
